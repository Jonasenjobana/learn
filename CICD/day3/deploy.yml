name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy environment
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_ENV: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print deploy target
        run: echo "Deploying to $DEPLOY_ENV"

      - name: Check secret exists
        run: |
          if [ -z "${{ secrets.DEPLOY_TOKEN }}" ]; then
            echo "DEPLOY_TOKEN is not configured"
            exit 1
          fi
          echo "DEPLOY_TOKEN is configured"

      - name: Simulate deploy
        run: echo "deploy success"
